description: >-
  The U.S. Navy plays a crucial role in defending national security and protecting the
  country's interests at sea. It operates a fleet of ships and submarines, as well as
  aircraft and personnel, to conduct a range of missions, including maritime patrol,
  reconnaissance, and combat operations. The Navy also performs humanitarian missions,
  such as disaster relief and search and rescue efforts. No public APIs have been
  identified at this time. The previously listed CNATRA "API" reference is an Aviation
  Preflight Indoctrination training video library, not a programmatic API.
